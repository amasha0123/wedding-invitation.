<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Anuradha & Poornima</title>
    <meta name="description" content="We joyfully invite you to celebrate our wedding on May 4th, 2026.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-content">
        <div class="invitation-card">
            <div class="floral-decoration top"></div>
            
            <header>
                <p class="greeting-text">🌸 You're Invited! 🌸</p>
                <h2 class="guest-name" id="guestName">Dear Guest,</h2>
            </header>

            <main>
                <p class="invite-msg">We joyfully invite you to celebrate our wedding!</p>
                
                <div class="couple-names">
                    <span class="name">Anuradha</span>
                    <span class="ampersand">&</span>
                    <span class="name">Poornima</span>
                </div>

                <div class="details-section">
                    <div class="detail-item">
                        <span class="icon">📅</span>
                        <p>Monday, 04 May 2026</p>
                    </div>
                    <div class="detail-item">
                        <span class="icon">⏰</span>
                        <p>Function starts at 9:00 AM</p>
                    </div>
                    <div class="detail-item">
                        <span class="icon">📍</span>
                        <p>Ella Flower Garden Hotel, Ella</p>
                    </div>
                </div>

                <div class="action-buttons">
                    <a href="https://maps.app.goo.gl/3X8S5L6Z4X6Z4X6Z4" target="_blank" class="btn btn-primary" id="mapBtn">
                        View Location
                    </a>
                    <button class="btn btn-secondary" id="calendarBtn">
                        Save to Calendar
                    </button>
                </div>

                <div class="share-section">
                    <p class="share-title">Invite Someone Else</p>
                    <div class="share-input-group">
                        <input type="text" id="shareName" placeholder="Enter guest name..." aria-label="Guest Name">
                        <button id="shareBtn" class="btn btn-share">
                            <span>Share Invitation</span>
                            <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92zM18 4c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zM6 13c-.55 0-1-.45-1-1s.45-1-1 1-1 .45-1 1 .45 1 1 1zM18 20c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"></path></svg>
                        </button>
                    </div>
                    <p id="shareStatus" class="share-status"></p>
                </div>
            </main>

            <footer>
                <p class="closing-text">With love, Anuradha & Poornima 💛</p>
            </footer>

            <div class="floral-decoration bottom"></div>
        </div>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="flower-loader"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
